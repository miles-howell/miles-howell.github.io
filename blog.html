---
layout: default
title: Blog
---
<div class="container mx-auto px-4">
    <h1 class="text-4xl font-bold mb-8">Recent Posts</h1>
    <div class="space-y-6">
        
        <!-- Jekyll will automatically generate this list -->
        {% for post in site.posts %}
            <div class="post-entry">
                <p class="text-gray-500 text-sm">{{ post.date | date: "%B %d, %Y" }}</p>
                <h2 class="text-2xl font-bold">
                    <a href="{{ post.url | relative_url }}" class="hover:text-blue-600 transition-colors">{{ post.title | escape }}</a>
                </h2>
                <p class="text-gray-600 mt-1">{{ post.excerpt }}</p>
            </div>
        {% endfor %}

    </div>
</div>
