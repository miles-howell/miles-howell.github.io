# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.

# -- Site Settings --
title: Miles Howell # Appears in the browser tab
email: miles@plannedpixel.com
description: >- # this means to ignore newlines until "baseurl:"
  A short description of your blog. This will be used by search engines.
baseurl: "" # the subpath of your site, e.g. /blog. If you're using a custom domain, this is usually empty.
url: "https://miles-howell.github.io" # your site's full URL
github_username:  miles-howell
lang: en
timezone: America/Chicago
tagline: Preferred by 9/10 bugs
paginate: 10

github:
  username: miles-howell

twitter:
  username: test

# -- Build settings --
# We are using the default theme, minima, but overriding the layouts.
theme: jekyll-theme-chirpy
plugins:
  - jekyll-feed

# Tells Jekyll to use Tailwind CSS
# This part is important for making the design work.
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

#
# Profile Information
#
avatar: /assets/img/avatar.jpg # Path to your avatar image
bio: "A brief bio about yourself."
social:
  name: Miles Howell
  email: miles@plannedpixel.com
  links:
    # The first element serves as the copyright owner's link
    - https://github.com/miles-howell
    - https://instagram.com/mhcporty
    - https://www.linkedin.com/in/miles-howell-0819142a0/