<div class="container mx-auto px-4 py-8">
    <header class="flex justify-between items-center mb-8">
        <a href="{{ "/" | relative_url }}" class="text-2xl font-bold text-gray-900">{{ site.title | escape }}</a>
        <nav>
            {% assign current_page = page.url | split: '/' | last %}
            <a href="{{ "/blog.html" | relative_url }}" 
               class="text-lg {% if current_page == 'blog.html' or page.layout == 'post' %}text-gray-900 font-bold{% else %}text-gray-600{% endif %} hover:text-gray-900 transition-colors">
               Blog
            </a>
        </nav>
    </header>
</div>
