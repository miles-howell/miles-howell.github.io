---
# This layout inherits from the 'default' layout
layout: default
---
<div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Main Content -->
        <div class="lg:col-span-3">
            <article id="main-content" class="prose lg:prose-xl max-w-none">
                <h1>{{ page.title | escape }}</h1>
                <p class="text-gray-500">
                    Published on {{ page.date | date: "%B %d, %Y" }}
                </p>
                
                <!-- The actual blog post content from the Markdown file goes here -->
                {{ content }}

            </article>
        </div>

        <!-- Table of Contents Sidebar -->
        <aside class="lg:col-span-1">
            <div class="sticky top-8">
                <h3 class="text-lg font-bold mb-4">Table of Contents</h3>
                <nav id="toc"></nav>
            </div>
        </aside>
    </div>
</div>
